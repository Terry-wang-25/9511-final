  <script src="site-preferences.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const fallback = "主页面.html";
      const returnPage = params.get("return") || (document.referrer ? document.referrer.split("/").pop() : fallback) || fallback;

      const close = () => {
        window.location.href = returnPage;
      };

      document.getElementById("lang-close-btn").addEventListener("click", close);
      document.getElementById("lang-cancel-btn").addEventListener("click", close);

      document.querySelectorAll(".overlay-lang-list .card").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("input")) return;
          const inp = card.querySelector("input[type='radio']");
          if (inp) inp.checked = true;
        });
      });

      try {
        const raw = localStorage.getItem("consumerRightsPrefs");
        const prefs = raw ? JSON.parse(raw) : {};
        const selectedLang = prefs.language || "en";
        const selectedRadio = document.querySelector(`input[name="lang"][value="${selectedLang}"]`) || document.getElementById("lang-en");
        if (selectedRadio) selectedRadio.checked = true;
      } catch {
        // no-op
      }

      document.getElementById("lang-apply-btn").addEventListener("click", function () {
        const selected = document.querySelector("input[name='lang']:checked");
        const lang = selected ? selected.value : "en";
        if (window.CR_PREFS && typeof window.CR_PREFS.applyPatch === "function") {
          window.CR_PREFS.applyPatch({ language: lang });
        }
        const target = new URL(returnPage, window.location.href);
        target.searchParams.set("lang", lang);
        window.location.href = `${target.pathname.split("/").pop()}?${target.searchParams.toString()}`;
      });
    })();
  </script>
