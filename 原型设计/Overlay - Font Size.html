  <!-- Overlay -->
  <div class="overlay-backdrop">
    <div class="overlay-panel" style="max-width:760px; width:min(94vw,760px);">
      <div class="overlay-header">
        <h2>Font Size</h2>
        <button type="button" id="font-close-btn" class="overlay-close" aria-label="Close">×</button>
      </div>
      <div class="overlay-body">
        <p style="color:var(--color-text-secondary); margin-bottom:1.25rem;">Adjust text size to suit your reading needs.</p>

        <div class="overlay-font-stepper">
          <button type="button" id="overlay-font-minus" class="btn btn-outline btn-sm" aria-label="Decrease font size">A-</button>
          <div class="overlay-font-stepper-center">
            <div id="font-size-current-title" class="overlay-font-current-label">Medium</div>
            <div class="overlay-font-current-sub">Current size</div>
          </div>
          <button type="button" id="overlay-font-plus" class="btn btn-outline btn-sm" aria-label="Increase font size">A+</button>
        </div>

        <div class="overlay-font-list" style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1.5rem;">
          <div class="card overlay-font-card" style="padding:1rem; cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="font-size" id="fs-small" value="small">
              <label for="fs-small"><strong>Small</strong> — 14px</label>
            </div>
          </div>
          <div class="card overlay-font-card" style="padding:1rem; cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="font-size" id="fs-medium" value="medium" checked>
              <label for="fs-medium"><strong>Medium</strong> — 16px (default)</label>
            </div>
          </div>
          <div class="card overlay-font-card" style="padding:1rem; cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="font-size" id="fs-large" value="large">
              <label for="fs-large"><strong>Large</strong> — 18px</label>
            </div>
          </div>
          <div class="card overlay-font-card" style="padding:1rem; cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="font-size" id="fs-xlarge" value="xlarge">
              <label for="fs-xlarge"><strong>Extra large</strong> — 22px</label>
            </div>
          </div>
        </div>

        <div class="overlay-font-preview">
          <p id="font-preview-text" class="overlay-font-preview-inner"><strong>Preview:</strong> This is sample text to preview the adjusted font size.</p>
        </div>
      </div>
      <div class="overlay-footer">
        <a href="Overlay - Screen Reader.html" class="btn btn-outline btn-sm">Back to accessibility menu</a>
        <button type="button" id="font-cancel-btn" class="btn btn-outline btn-sm">Cancel</button>
        <button type="button" id="font-apply-btn" class="btn btn-primary btn-sm">Apply</button>
      </div>
    </div>
  </div>

  <script src="site-preferences.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const fallback = "主页面.html";
      const returnPage = params.get("return") || (document.referrer ? document.referrer.split("/").pop() : fallback) || fallback;

      const ORDER = ["small", "medium", "large", "xlarge"];
      const LABELS = { small: "Small", medium: "Medium", large: "Large", xlarge: "Extra large" };
      const PREVIEW_PX = { small: "14px", medium: "16px", large: "18px", xlarge: "22px" };
      const LABEL_REM = { small: "0.9rem", medium: "1rem", large: "1.12rem", xlarge: "1.28rem" };

      const titleEl = document.getElementById("font-size-current-title");
      const previewEl = document.getElementById("font-preview-text");

      function getValue() {
        const el = document.querySelector("input[name='font-size']:checked");
        return el ? el.value : "medium";
      }

      function setValue(v) {
        const input = document.querySelector(`input[name='font-size'][value="${v}"]`);
        if (input) input.checked = true;
        syncUi();
      }

      function syncUi() {
        const v = getValue();
        if (titleEl) titleEl.textContent = LABELS[v] || "Medium";
        if (previewEl) previewEl.style.fontSize = PREVIEW_PX[v] || "16px";
        document.querySelectorAll(".overlay-font-card label").forEach((lab) => {
          const forId = lab.getAttribute("for");
          const inp = forId && document.getElementById(forId);
          const key = inp && inp.value;
          if (key && LABEL_REM[key]) lab.style.fontSize = LABEL_REM[key];
        });
      }

      function step(delta) {
        const cur = getValue();
        const i = ORDER.indexOf(cur);
        const ni = Math.min(ORDER.length - 1, Math.max(0, i + delta));
        setValue(ORDER[ni]);
      }

      const close = () => {
        window.location.href = returnPage;
      };

      document.getElementById("font-close-btn").addEventListener("click", close);
      document.getElementById("font-cancel-btn").addEventListener("click", close);

      document.getElementById("overlay-font-minus").addEventListener("click", () => step(-1));
      document.getElementById("overlay-font-plus").addEventListener("click", () => step(1));

      document.querySelectorAll("input[name='font-size']").forEach((r) => {
        r.addEventListener("change", syncUi);
      });

      document.querySelectorAll(".overlay-font-card").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("input")) return;
          const inp = card.querySelector("input[type='radio']");
          if (inp) {
            inp.checked = true;
            syncUi();
          }
        });
      });

      try {
        const raw = localStorage.getItem("consumerRightsPrefs");
        const prefs = raw ? JSON.parse(raw) : {};
        const saved = prefs.fontSize && ORDER.includes(prefs.fontSize) ? prefs.fontSize : "medium";
        setValue(saved);
      } catch {
        syncUi();
      }

      document.getElementById("font-apply-btn").addEventListener("click", function () {
        const font = getValue();
        if (window.CR_PREFS && typeof window.CR_PREFS.applyPatch === "function") {
          window.CR_PREFS.applyPatch({ fontSize: font });
        } else {
          const target = new URL(returnPage, window.location.href);
          target.searchParams.set("font", font);
          window.location.href = `${target.pathname.split("/").pop()}?${target.searchParams.toString()}`;
          return;
        }
        window.location.href = returnPage;
      });
    })();
  </script>
