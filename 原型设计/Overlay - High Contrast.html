  <div class="overlay-backdrop">
    <div class="overlay-panel" style="max-width:760px; width:min(94vw,760px);">
      <div class="overlay-header">
        <h2>High Contrast Mode</h2>
        <button type="button" id="contrast-close-btn" class="overlay-close" aria-label="Close">×</button>
      </div>
      <div class="overlay-body">
        <p style="color:var(--color-text-secondary); margin-bottom:1.5rem;">High contrast mode improves text/background contrast to make content easier to read.</p>

        <div style="display:flex; flex-direction:column; gap:0.75rem; margin-bottom:1.5rem;">
          <div class="card" style="cursor:pointer; border:2px solid var(--color-primary);">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="contrast" id="c-default" value="default" checked>
              <label for="c-default">
                <strong>Default mode</strong><br>
                <span style="font-size:0.9rem; color:var(--color-text-secondary);">Standard color scheme</span>
              </label>
            </div>
            <div style="margin-top:0.75rem; padding:0.75rem; background:#fff; border:1px solid var(--color-border-light); border-radius:var(--radius-sm);">
              <span style="color:#1a1a1a; background:#fff; padding:0.2rem 0.5rem;">Text sample</span>
              <span style="color:#fff; background:#8c1d40; padding:0.2rem 0.5rem; margin-left:0.5rem;">Button</span>
            </div>
          </div>

          <div class="card" style="cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="contrast" id="c-high" value="high">
              <label for="c-high">
                <strong>High contrast</strong><br>
                <span style="font-size:0.9rem; color:var(--color-text-secondary);">Enhanced text/background contrast</span>
              </label>
            </div>
            <div style="margin-top:0.75rem; padding:0.75rem; background:#000; border:1px solid #fff; border-radius:var(--radius-sm);">
              <span style="color:#fff; background:#000; padding:0.2rem 0.5rem;">Text sample</span>
              <span style="color:#000; background:#ffff00; padding:0.2rem 0.5rem; margin-left:0.5rem;">Button</span>
            </div>
          </div>

          <div class="card" style="cursor:pointer;">
            <div class="form-check" style="margin-bottom:0;">
              <input type="radio" name="contrast" id="c-dark" value="dark">
              <label for="c-dark">
                <strong>Dark mode</strong><br>
                <span style="font-size:0.9rem; color:var(--color-text-secondary);">Dark background with reduced brightness</span>
              </label>
            </div>
            <div style="margin-top:0.75rem; padding:0.75rem; background:#161616; border:1px solid #333; border-radius:var(--radius-sm);">
              <span style="color:#e0e0e0; padding:0.2rem 0.5rem;">Text sample</span>
              <span style="color:#fff; background:#6f1733; padding:0.2rem 0.5rem; margin-left:0.5rem;">Button</span>
            </div>
          </div>
        </div>
      </div>
      <div class="overlay-footer">
        <a href="Overlay - Screen Reader.html" class="btn btn-outline btn-sm">Back to accessibility menu</a>
        <button type="button" id="contrast-cancel-btn" class="btn btn-outline btn-sm">Cancel</button>
        <button type="button" id="contrast-apply-btn" class="btn btn-primary btn-sm">Apply</button>
      </div>
    </div>

  <script src="site-preferences.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const fallback = "主页面.html";
      const returnPage = params.get("return") || (document.referrer ? document.referrer.split("/").pop() : fallback) || fallback;

      const close = () => {
        window.location.href = returnPage;
      };

      document.getElementById("contrast-close-btn").addEventListener("click", close);
      document.getElementById("contrast-cancel-btn").addEventListener("click", close);

      document.getElementById("contrast-apply-btn").addEventListener("click", function () {
        const selected = document.querySelector("input[name='contrast']:checked");
        const contrast = selected ? selected.value : "default";
        const target = new URL(returnPage, window.location.href);
        target.searchParams.set("contrast", contrast);
        window.location.href = `${target.pathname.split("/").pop()}?${target.searchParams.toString()}`;
      });
    })();
  </script>
