        <h1>Your Suggested Next Steps</h1>
        <p style="color:var(--color-text-secondary);">Based on your answers, here is what you can do next.</p>

        <div class="card" style="margin-top:1rem;">
          <h2 style="font-size:1.3rem;">Recommendation</h2>

        </div>

  <script>
    const answers = JSON.parse(localStorage.getItem("consumerRightsAnswers") || "{}");
    const rec = [];
    const summary = [];

    const labels = {
      q1: {
        faulty: "The product is faulty or damaged",
        not_delivered: "The item was not delivered",
        different: "The item is different from what was described",
        changed_mind: "I changed my mind / no longer want it"
      },
      q2: {
        lt_7: "Less than 7 days ago",
        "7_30": "7 to 30 days ago",
        gt_30: "More than 30 days ago",
        not_sure: "I am not sure"
      },
      q3: {
        online: "Online",
        in_store: "In-store",
        phone: "Over the phone",
        not_sure: "I am not sure"
      },
      q4: {
        refused: "Yes, and they refused to help",
        no_reply: "Yes, but I have not received a reply",
        not_contacted: "No, not yet",
        not_sure: "I am not sure what to say"
      },
      q5: {
        refund: "A refund",
        repair: "A repair",
        replacement: "A replacement",
        not_sure: "I am not sure, I just want help"
      }
    };

    if (answers.q1 && answers.q2 && answers.q3 && answers.q4 && answers.q5) {
      const isFaulty = answers.q1 === "faulty";
      const isRecent = answers.q2 === "lt_7" || answers.q2 === "7_30";
      const wantsRefund = answers.q5 === "refund";
      const notContacted = answers.q4 === "not_contacted";

      if (isFaulty && isRecent && wantsRefund && notContacted) {
        rec.push("You may be able to ask for a refund.");
        rec.push("First, contact the business.");
        rec.push("Prepare proof of purchase and photos.");
        rec.push("Use our claim template.");
      } else {
        if (answers.q1 === "faulty") rec.push("You may have rights to a repair, replacement, or refund.");
        if (answers.q1 === "not_delivered") rec.push("Ask the business for delivery proof or a full refund.");
        if (answers.q1 === "different") rec.push("Request a remedy because the item was not as described.");
        if (answers.q1 === "changed_mind") rec.push("A refund may depend on the store's return policy.");

        if (answers.q2 === "gt_30") rec.push("Because more time has passed, gather strong supporting evidence.");
        if (answers.q4 === "not_contacted") rec.push("First, contact the business directly and clearly explain the issue.");
        if (answers.q4 === "refused" || answers.q4 === "no_reply") rec.push("Escalate your complaint using a formal written claim.");

        if (answers.q5 === "refund") rec.push("State clearly that your preferred outcome is a refund.");
        if (answers.q5 === "repair") rec.push("Ask for a repair with a clear expected timeframe.");
        if (answers.q5 === "replacement") rec.push("Request a replacement item of equivalent value.");
        if (answers.q5 === "not_sure") rec.push("We can help you choose the best remedy based on your documents.");

        rec.push("Keep screenshots, receipts, order details, and message history.");
        rec.push("Use our claim template if the business does not resolve the issue.");
      }
    } else {
      rec.push("We could not find complete answers.");
      rec.push("Please complete all 5 questions so we can provide accurate next steps.");
    }

    const summaryPairs = [
      ["Problem type", labels.q1[answers.q1]],
      ["When problem happened", labels.q2[answers.q2]],
      ["Purchase channel", labels.q3[answers.q3]],
      ["Contacted business", labels.q4[answers.q4]],
      ["Preferred outcome", labels.q5[answers.q5]]
    ];

    summaryPairs.forEach(([k, v]) => {
      summary.push(`${k}: ${v || "Not answered"}`);
    });

    document.getElementById("recommendations").innerHTML = rec.map(i => `<li>${i}</li>`).join("");
    document.getElementById("answer-summary").innerHTML = summary.map(i => `<li>${i}</li>`).join("");
  </script>
