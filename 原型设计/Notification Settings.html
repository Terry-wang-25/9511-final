  <section class="page-header">
    <div class="container">
      <h1>通知设置</h1>
      <p>管理你接收通知的方式和内容</p>
    </div>
  </section>

  <main class="page-content">
    <div class="container">
      <div style="max-width:640px;">

        <h2>案件通知</h2>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="form-check">
            <input type="checkbox" id="notify-case-email" checked>
            <label for="notify-case-email">案件状态更新 — 邮件通知</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="notify-case-sms" checked>
            <label for="notify-case-sms">案件状态更新 — 短信通知</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="notify-case-response">
            <label for="notify-case-response">收到案件回复时通知</label>
          </div>
        </div>

        <h2>活动与新闻</h2>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="form-check">
            <input type="checkbox" id="notify-events" checked>
            <label for="notify-events">即将举办的活动提醒</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="notify-news">
            <label for="notify-news">新闻和政策更新</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="notify-newsletter">
            <label for="notify-newsletter">每月资讯汇总邮件</label>
          </div>
        </div>

        <h2>论坛</h2>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="form-check">
            <input type="checkbox" id="notify-forum-reply" checked>
            <label for="notify-forum-reply">我的帖子有新回复</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="notify-forum-mention">
            <label for="notify-forum-mention">有人@提到我</label>
          </div>
        </div>

        <h2>通知频率</h2>
        <div class="card" style="margin-bottom:2rem;">
          <div class="form-group" style="margin-bottom:0;">
            <label for="frequency">邮件通知频率</label>
            <select id="frequency" class="form-control" style="max-width:300px;">
              <option>即时通知</option>
              <option>每日汇总</option>
              <option>每周汇总</option>
            </select>
          </div>
        </div>

        <div style="display:flex; gap:0.75rem;">
          <button type="button" class="btn btn-primary">保存设置</button>
          <a href="主页面.html" class="btn btn-outline">返回面板</a>
        </div>
      </div>
    </div>
